<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>福气年度 ToDo</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="theme-color" content="#c2410c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="福气ToDo" />
  <style>
    *{box-sizing:border-box} :root{--text:#3f1f12;--muted:#8a5a36;--primary:#c2410c;--line:rgba(180,83,9,.22);--shadow:0 24px 80px rgba(124,45,18,.18)}
    body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at top left,rgba(220,38,38,.22),transparent 30%),radial-gradient(circle at top right,rgba(245,158,11,.24),transparent 30%),radial-gradient(circle at bottom left,rgba(15,118,110,.13),transparent 32%),linear-gradient(135deg,#fff7ed 0%,#ffedd5 46%,#fef3c7 100%);color:var(--text);padding:18px;padding-top:max(18px,env(safe-area-inset-top))}
    .page{width:100%;max-width:1180px;margin:0 auto;padding:18px 0 40px}.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:18px}.eyebrow{display:inline-flex;gap:8px;padding:8px 13px;border-radius:999px;background:linear-gradient(135deg,rgba(255,247,237,.92),rgba(254,243,199,.9));border:1px solid rgba(245,158,11,.42);color:#9a3412;font-size:13px;font-weight:900;box-shadow:0 10px 28px rgba(124,45,18,.1)}h1{margin:14px 0 8px;font-size:clamp(34px,5vw,58px);line-height:1;letter-spacing:-1.8px;color:#7c2d12;text-shadow:0 2px 0 rgba(255,255,255,.7)}.desc{margin:0;max-width:680px;color:var(--muted);line-height:1.7;font-size:15px}.year-pill{min-width:128px;border-radius:26px;padding:18px;text-align:center;background:linear-gradient(135deg,rgba(194,65,12,.94),rgba(245,158,11,.92));border:1px solid rgba(255,237,213,.9);color:#fff7ed;box-shadow:0 18px 50px rgba(194,65,12,.24)}.year-pill strong{display:block;font-size:34px;line-height:1}.year-pill span{display:block;margin-top:8px;color:#ffedd5;font-size:12px;font-weight:800}
    .app{position:relative;overflow:hidden;background:rgba(255,252,242,.9);border:1px solid rgba(251,191,36,.42);border-radius:32px;padding:18px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.app:before{content:"福";position:absolute;right:26px;top:18px;font-size:96px;font-weight:900;color:rgba(194,65,12,.055);pointer-events:none;transform:rotate(-10deg)}.control-panel{display:grid;grid-template-columns:1.5fr 1fr auto;gap:10px;align-items:stretch;margin-bottom:12px}input{width:100%;min-height:54px;padding:0 16px;border-radius:18px;border:1px solid var(--line);background:rgba(255,251,235,.92);color:var(--text);font-size:15px;outline:none}input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(194,65,12,.14)}button{min-height:44px;padding:10px 14px;border-radius:16px;border:0;cursor:pointer;font-weight:800;font-size:14px;transition:.18s;-webkit-tap-highlight-color:transparent}button:active{transform:scale(.97)}.button-group{display:grid;grid-template-columns:repeat(3,auto);gap:8px}.add-btn{background:linear-gradient(135deg,#c2410c,#dc2626);color:white;box-shadow:0 14px 28px rgba(194,65,12,.28)}.voice-btn{background:#ccfbf1;color:#0f766e}.notify-btn{background:#fef3c7;color:#92400e}.priority-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}.toggle{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:9px 14px;border-radius:999px;border:1px solid var(--line);font-size:13px;font-weight:800;cursor:pointer;background:rgba(255,255,255,.82);color:#475569;user-select:none}.toggle.active{background:linear-gradient(135deg,#7c2d12,#c2410c);color:white;border-color:#c2410c;box-shadow:0 12px 26px rgba(194,65,12,.2)}.hint{margin-left:auto;color:var(--muted);font-size:13px;line-height:1.5}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0 18px}.summary-card{background:linear-gradient(135deg,rgba(255,247,237,.88),rgba(255,251,235,.76));border:1px solid rgba(245,158,11,.28);border-radius:22px;padding:15px 14px;box-shadow:0 10px 30px rgba(124,45,18,.06)}.summary-card strong{display:block;font-size:28px;line-height:1}.summary-card span{display:block;margin-top:8px;font-size:12px;color:var(--muted);font-weight:800}.quadrant-guide{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0 14px}.quadrant-card{border-radius:18px;padding:12px;border:1px solid rgba(226,232,240,.9);background:rgba(255,255,255,.72);box-shadow:0 8px 22px rgba(15,23,42,.04)}.quadrant-card strong{display:block;font-size:13px}.quadrant-card span{display:block;margin-top:5px;color:#64748b;font-size:11px;font-weight:800}.q-fire{background:#fff1f2;border-color:#fecdd3}.q-star{background:#fffbeb;border-color:#fde68a}.q-bolt{background:#eff6ff;border-color:#bfdbfe}.q-ice{background:#f8fafc;border-color:#e2e8f0}
    .calendar-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:16px 0 12px;padding:10px;border-radius:22px;background:rgba(255,247,237,.72);border:1px solid rgba(245,158,11,.32)}.calendar-range-title{font-size:15px;font-weight:900}.calendar-nav{display:flex;gap:8px}.nav-btn{min-height:38px;padding:8px 12px;background:#fff7ed;color:var(--primary);border:1px solid rgba(194,65,12,.25);font-size:12px;box-shadow:0 8px 18px rgba(124,45,18,.06)}.year-calendar{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.month-card{background:linear-gradient(180deg,rgba(255,252,242,.92),rgba(255,247,237,.82));border:1px solid rgba(245,158,11,.32);border-radius:24px;padding:14px;box-shadow:0 14px 36px rgba(124,45,18,.08)}.month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.month-title{font-size:16px;font-weight:900;color:#9a3412}.month-stats{padding:5px 9px;border-radius:999px;background:#f8fafc;color:#64748b;font-size:11px;font-weight:900}.weekday-row,.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}.weekday{text-align:center;font-size:10px;font-weight:900;color:#94a3b8;padding:3px 0}.day-cell{position:relative;aspect-ratio:1/1;border-radius:10px;border:1px solid transparent;background:rgba(248,250,252,.82);color:#475569;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.16s}.empty-day{background:transparent;cursor:default}.has-task{background:#ffedd5;color:#9a3412;border-color:#fdba74}.hot{background:#fecaca;color:#991b1b;border-color:#fca5a5}.done-all{background:#dcfce7;color:#166534;border-color:#bbf7d0}.today{outline:2px solid #0f766e;outline-offset:2px}.selected-day{box-shadow:0 0 0 3px rgba(79,70,229,.25);transform:translateY(-1px)}.day-cell:not(.empty-day):hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,23,42,.12)}.task-dot{position:absolute;right:4px;bottom:4px;min-width:14px;height:14px;padding:0 4px;border-radius:999px;background:#c2410c;color:white;display:flex;align-items:center;justify-content:center;font-size:9px;line-height:1;font-weight:900}.hot-dot{background:#ef4444}.done-dot{background:#22c55e}
    .selected-panel{margin-top:18px;background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.88);border-radius:26px;padding:14px;box-shadow:0 14px 36px rgba(15,23,42,.07)}.selected-header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.selected-title{font-size:16px;font-weight:900}.clear-filter-btn{min-height:36px;padding:7px 12px;background:white;color:var(--primary);border:1px solid #c7d2fe;font-size:12px}ul{list-style:none;padding:0;margin:0}li{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid rgba(226,232,240,.9);border-radius:18px;margin-top:10px;background:rgba(255,255,255,.86)}.task-main{flex:1;min-width:0}.task-text{display:block;font-size:15px;line-height:1.45;word-break:break-word;cursor:pointer;font-weight:700}.done{text-decoration:line-through;color:#94a3b8}.meta{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}.tag{font-size:11px;padding:4px 8px;border-radius:999px;font-weight:900}.important{background:#fef3c7;color:#92400e}.urgent{background:#fee2e2;color:#991b1b}.both{background:#fecaca;color:#7f1d1d}.reminder{background:#dcfce7;color:#166534}.expired{background:#f1f5f9;color:#64748b}.low{background:#f8fafc;color:#64748b;border:1px solid #e2e8f0}.delete-btn{min-height:40px;background:#fee2e2;color:#b91c1c}.empty{margin-top:10px;padding:22px;text-align:center;border-radius:20px;background:rgba(248,250,252,.86);color:#64748b;border:1px dashed #cbd5e1;font-weight:700}.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;color:#64748b;font-size:12px;font-weight:800}.legend-item{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid rgba(226,232,240,.85)}.legend-swatch{width:12px;height:12px;border-radius:4px;display:inline-block}.swatch-normal{background:#ffedd5}.swatch-hot{background:#fee2e2}.swatch-done{background:#dcfce7}.swatch-today{border:2px solid #0f766e}
    @media(max-width:900px){.hero{align-items:flex-start;flex-direction:column}.year-pill{width:100%;text-align:left}.control-panel{grid-template-columns:1fr}.button-group{grid-template-columns:repeat(3,1fr)}.summary{grid-template-columns:repeat(2,1fr)}.quadrant-guide{grid-template-columns:repeat(2,1fr)}.year-calendar{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){body{padding:12px}.page{padding-top:8px}.app{padding:12px;border-radius:26px}.button-group{grid-template-columns:1fr}.calendar-toolbar{flex-direction:column;align-items:stretch}.calendar-nav{display:grid;grid-template-columns:1fr}.quadrant-guide{grid-template-columns:1fr}.priority-row{align-items:stretch}.toggle{width:100%}.hint{margin-left:0;width:100%}.summary{grid-template-columns:repeat(2,1fr)}.year-calendar{grid-template-columns:1fr}li{align-items:flex-start}.delete-btn{width:auto}}
  </style>
</head>
<body>
<div class="page"><section class="hero"><div><div class="eyebrow">🍵 福气满满 · 年度计划</div><h1>福气年度 ToDo</h1><p class="desc">以一年为单位查看任务分布。设置提醒时间后，任务会自动出现在对应日期；点击日期即可查看当天任务。红金配色更喜庆，适合每天打开看一眼。</p></div><div class="year-pill"><strong id="yearNumber">2026</strong><span>顺顺利利</span></div></section>
<div class="app"><div class="control-panel"><input id="taskInput" placeholder="输入任务，例如：整理会议资料"><input id="reminderInput" type="datetime-local" title="提醒时间"><div class="button-group"><button class="voice-btn" onclick="toggleVoiceInput()">🎤 语音</button><button class="notify-btn" onclick="requestNotificationPermission()">🔔 通知</button><button class="add-btn" onclick="addTask()">添加</button></div></div><div class="priority-row"><div id="importantBtn" class="toggle" onclick="toggleFlag('important')">⭐ 重要</div><div id="urgentBtn" class="toggle" onclick="toggleFlag('urgent')">⚡ 紧急</div><span id="statusText" class="hint">提醒功能需要浏览器通知权限。</span></div><div class="summary"><div class="summary-card"><strong id="totalCount">0</strong><span>今年任务</span></div><div class="summary-card"><strong id="activeCount">0</strong><span>待完成</span></div><div class="summary-card"><strong id="reminderCount">0</strong><span>有提醒</span></div><div class="summary-card"><strong id="hotCount">0</strong><span>立即处理</span></div></div><div class="quadrant-guide"><div class="quadrant-card q-fire"><strong>🔥 立即处理</strong><span>重要 + 紧急</span></div><div class="quadrant-card q-star"><strong>⭐ 安排推进</strong><span>重要 + 不紧急</span></div><div class="quadrant-card q-bolt"><strong>⚡ 快速处理</strong><span>不重要 + 紧急</span></div><div class="quadrant-card q-ice"><strong>🧊 可延后</strong><span>不重要 + 不紧急</span></div></div><div class="calendar-toolbar"><div id="calendarRangeTitle" class="calendar-range-title">月份</div><div class="calendar-nav"><button class="nav-btn" onclick="changeMonthGroup(-3)">← 前三个月</button><button class="nav-btn" onclick="goCurrentMonthGroup()">回到本月</button><button class="nav-btn" onclick="changeMonthGroup(3)">后三个月 →</button></div></div><div id="yearCalendar" class="year-calendar"></div><div class="legend"><span class="legend-item"><span class="legend-swatch swatch-normal"></span>有任务</span><span class="legend-item"><span class="legend-swatch swatch-hot"></span>含立即处理</span><span class="legend-item"><span class="legend-swatch swatch-done"></span>当天已完成</span><span class="legend-item"><span class="legend-swatch swatch-today"></span>今天</span></div><section class="selected-panel"><div class="selected-header"><div id="selectedTitle" class="selected-title">未安排日期的任务</div><button class="clear-filter-btn" onclick="clearDateFilter()">查看未安排</button></div><ul id="list"></ul><div id="emptyState" class="empty" style="display:none;">当前没有任务。</div></section></div></div>
<script>
let tasks=JSON.parse(localStorage.getItem('tasks')||'[]'),isImportant=false,isUrgent=false,recognition=null,reminderTimer=null,selectedDateKey=null;const currentYear=new Date().getFullYear();let visibleStartMonth=Math.floor(new Date().getMonth()/3)*3;function save(){localStorage.setItem('tasks',JSON.stringify(tasks))}function toggleFlag(t){if(t==='important'){isImportant=!isImportant;document.getElementById('importantBtn').classList.toggle('active')}if(t==='urgent'){isUrgent=!isUrgent;document.getElementById('urgentBtn').classList.toggle('active')}}function addTask(text){const input=document.getElementById('taskInput'),r=document.getElementById('reminderInput'),value=(text||input.value).trim();if(!value)return;const reminderAt=r.value?new Date(r.value).getTime():null;tasks.push({id:Date.now()+Math.random(),text:value,done:false,important:isImportant,urgent:isUrgent,reminderAt,notified:false});input.value='';r.value='';isImportant=false;isUrgent=false;document.getElementById('importantBtn').classList.remove('active');document.getElementById('urgentBtn').classList.remove('active');if(reminderAt)selectedDateKey=dateKey(reminderAt);save();render();scheduleReminderCheck()}function formatTime(ts){if(!ts)return'';const d=new Date(ts),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'),h=String(d.getHours()).padStart(2,'0'),min=String(d.getMinutes()).padStart(2,'0');return`${y}-${m}-${day} ${h}:${min}`}function dateKey(ts){const d=new Date(ts),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${day}`}function formatDateLabel(key){const p=key.split('-');return`${p[0]}年${Number(p[1])}月${Number(p[2])}日`}function isHighPriority(t){return t.important&&t.urgent}function getPriorityLabel(t){if(t.important&&t.urgent)return{className:'both',text:'🔥 立即处理'};if(t.important&&!t.urgent)return{className:'important',text:'⭐ 安排推进'};if(!t.important&&t.urgent)return{className:'urgent',text:'⚡ 快速处理'};return{className:'low',text:'🧊 可延后'}}function getTasksByDateKey(key){return tasks.filter(t=>t.reminderAt&&dateKey(t.reminderAt)===key)}function getUnscheduledTasks(){return tasks.filter(t=>!t.reminderAt)}function getVisibleTasks(){return selectedDateKey?getTasksByDateKey(selectedDateKey):getUnscheduledTasks()}function selectDate(key){selectedDateKey=key;render()}function clearDateFilter(){selectedDateKey=null;render()}function renderYearCalendar(){const cal=document.getElementById('yearCalendar'),title=document.getElementById('calendarRangeTitle');cal.innerHTML='';const todayKey=dateKey(Date.now()),monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],weekNames=['一','二','三','四','五','六','日'],endMonth=Math.min(visibleStartMonth+2,11);title.innerText=`${currentYear}年 ${monthNames[visibleStartMonth]} - ${monthNames[endMonth]}`;for(let month=visibleStartMonth;month<=endMonth;month++){const monthCard=document.createElement('section');monthCard.className='month-card';const mh=document.createElement('div');mh.className='month-header';const mt=document.createElement('div');mt.className='month-title';mt.innerText=monthNames[month];const monthTasks=tasks.filter(t=>{if(!t.reminderAt)return false;const d=new Date(t.reminderAt);return d.getFullYear()===currentYear&&d.getMonth()===month});const ms=document.createElement('div');ms.className='month-stats';ms.innerText=`${monthTasks.length} 项`;mh.append(mt,ms);const wr=document.createElement('div');wr.className='weekday-row';weekNames.forEach(n=>{const w=document.createElement('div');w.className='weekday';w.innerText=n;wr.appendChild(w)});const grid=document.createElement('div');grid.className='days-grid';const first=new Date(currentYear,month,1),offset=(first.getDay()||7)-1;for(let i=0;i<offset;i++){const e=document.createElement('div');e.className='day-cell empty-day';grid.appendChild(e)}const days=new Date(currentYear,month+1,0).getDate();for(let day=1;day<=days;day++){const d=new Date(currentYear,month,day),key=dateKey(d.getTime()),dayTasks=getTasksByDateKey(key),active=dayTasks.filter(t=>!t.done),hotCount=dayTasks.filter(isHighPriority).length,allDone=dayTasks.length>0&&active.length===0,cell=document.createElement('div');cell.className='day-cell';cell.innerText=day;if(dayTasks.length>0)cell.classList.add('has-task');if(hotCount>0)cell.classList.add('hot');if(allDone)cell.classList.add('done-all');if(key===todayKey)cell.classList.add('today');if(key===selectedDateKey)cell.classList.add('selected-day');cell.onclick=()=>selectDate(key);if(dayTasks.length>0){const dot=document.createElement('span');dot.className='task-dot';if(hotCount>0)dot.classList.add('hot-dot');if(allDone)dot.classList.add('done-dot');dot.innerText=dayTasks.length;cell.appendChild(dot)}grid.appendChild(cell)}monthCard.append(mh,wr,grid);cal.appendChild(monthCard)}}function changeMonthGroup(step){visibleStartMonth=Math.max(0,Math.min(9,visibleStartMonth+step));render()}function goCurrentMonthGroup(){visibleStartMonth=Math.floor(new Date().getMonth()/3)*3;render()}function updateSummary(){const yearTasks=tasks.filter(t=>!t.reminderAt||new Date(t.reminderAt).getFullYear()===currentYear),active=yearTasks.filter(t=>!t.done).length,reminders=yearTasks.filter(t=>t.reminderAt&&!t.done).length,hot=yearTasks.filter(t=>!t.done&&isHighPriority(t)).length;document.getElementById('totalCount').innerText=yearTasks.length;document.getElementById('activeCount').innerText=active;document.getElementById('reminderCount').innerText=reminders;document.getElementById('hotCount').innerText=hot}function renderTaskList(){const list=document.getElementById('list'),empty=document.getElementById('emptyState'),title=document.getElementById('selectedTitle'),currentTasks=getVisibleTasks();list.innerHTML='';empty.style.display=currentTasks.length?'none':'block';title.innerText=selectedDateKey?`${formatDateLabel(selectedDateKey)} 的任务`:'未安排日期的任务';currentTasks.forEach(t=>{const idx=tasks.findIndex(x=>x.id===t.id),li=document.createElement('li'),main=document.createElement('div');main.className='task-main';const span=document.createElement('span');span.innerText=t.text;span.className='task-text';if(t.done)span.classList.add('done');span.onclick=()=>{tasks[idx].done=!tasks[idx].done;save();render();scheduleReminderCheck()};const meta=document.createElement('div');meta.className='meta';const p=getPriorityLabel(t),tag=document.createElement('span');tag.className='tag '+p.className;tag.innerText=p.text;meta.appendChild(tag);const rt=document.createElement('span');if(t.reminderAt){rt.className=(t.notified||Date.now()>t.reminderAt)?'tag expired':'tag reminder';rt.innerText='提醒：'+formatTime(t.reminderAt)}else{rt.className='tag expired';rt.innerText='未安排日期'}meta.appendChild(rt);const del=document.createElement('button');del.innerText='删除';del.className='delete-btn';del.onclick=()=>{tasks.splice(idx,1);save();render();scheduleReminderCheck()};main.append(span,meta);li.append(main,del);list.appendChild(li)})}function render(){document.getElementById('yearNumber').innerText=currentYear;updateSummary();renderYearCalendar();renderTaskList()}function requestNotificationPermission(){const s=document.getElementById('statusText');if(!('Notification'in window)){s.innerText='当前浏览器不支持通知功能。';return}Notification.requestPermission().then(p=>{if(p==='granted'){s.innerText='通知已开启。设置提醒时间后，到点会弹出提醒。';new Notification('福气 ToDo 通知已开启',{body:'之后你的任务提醒会显示在这里。'})}else{s.innerText='你没有允许通知权限，因此无法弹出提醒。'}})}function notifyTask(t){if('Notification'in window&&Notification.permission==='granted')new Notification('任务提醒',{body:t.text});else alert('任务提醒：'+t.text)}function checkReminders(){const now=Date.now();let changed=false;tasks.forEach(t=>{if(t.reminderAt&&!t.done&&!t.notified&&now>=t.reminderAt){notifyTask(t);t.notified=true;changed=true}});if(changed){save();render()}scheduleReminderCheck()}function scheduleReminderCheck(){if(reminderTimer)clearTimeout(reminderTimer);const pending=tasks.filter(t=>t.reminderAt&&!t.done&&!t.notified).sort((a,b)=>a.reminderAt-b.reminderAt);if(!pending.length)return;const delay=Math.max(1000,Math.min(pending[0].reminderAt-Date.now(),2147483647));reminderTimer=setTimeout(checkReminders,delay)}function toggleVoiceInput(){const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition,statusText=document.getElementById('statusText');if(!SpeechRecognition){statusText.innerText='当前浏览器不支持语音识别，建议使用 Chrome 或 Edge。';return}recognition=new SpeechRecognition();recognition.lang='zh-CN';recognition.onresult=e=>addTask(e.results[0][0].transcript.replace(/[。.!！?？]$/g,''));recognition.start()}document.getElementById('taskInput').addEventListener('keydown',e=>{if(e.key==='Enter')addTask()});if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(()=>{}))}render();scheduleReminderCheck();setInterval(checkReminders,60000);
</script>
